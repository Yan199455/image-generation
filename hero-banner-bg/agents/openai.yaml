# ChatGPT Custom GPT 元信息
# 用于在 ChatGPT 平台部署本 Skill 时的快速配置参考。
# 实际部署时，把以下字段填到 Custom GPT 编辑器对应位置。

name: Hero Banner BG Generator

description: >
  生成产品官网首屏 Hero Banner 背景图（不含文字、Logo、CTA）。
  按行业 + 情感 + 文案位置自动合成 GPT-Image-2 提示词，
  支持 14 个行业预设、6 种情感调性、11 个质感模块、约 140 个场景变体。

# 用作 Custom GPT 的 Instructions（粘贴 SKILL.md 中除 frontmatter 之外的全部 Markdown 内容）
